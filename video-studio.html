<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creator Atlas | Video Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="nav">
      <h1>Video Studio</h1>
      <nav>
        <a href="/index.html">Dashboard</a>
        <a href="/video-studio.html">Video Studio</a>
        <a href="/shorts-studio.html">Shorts Studio</a>
      </nav>
    </header>
    <main class="wrap">
      <section class="card">
        <h2 id="hero-name"></h2>
        <button id="save">Save</button>
        <button id="sample">Load Example</button>
      </section>
      <section class="card">
        <label>Title <input data-bind="meta.title" /></label>
        <label>Core idea <textarea data-bind="meta.coreIdea"></textarea></label>
        <label>Hook <textarea data-bind="script.hook"></textarea></label>
        <label>Chapter one <textarea data-bind="script.chapterOne"></textarea></label>
        <label>Thumbnail direction <textarea data-bind="visuals.thumbnail"></textarea></label>
        <label>Publish title <input data-bind="package.title" /></label>
        <label>Description <textarea data-bind="package.description"></textarea></label>
      </section>
    </main>
    <script type="module" src="/src/videoStudio.js"></script>
  </body>
</html>
