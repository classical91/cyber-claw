<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creator Atlas | Shorts Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="nav">
      <h1>Shorts Studio</h1>
      <nav>
        <a href="/index.html">Dashboard</a>
        <a href="/video-studio.html">Video Studio</a>
        <a href="/shorts-studio.html">Shorts Studio</a>
      </nav>
    </header>
    <main class="wrap">
      <section class="card">
        <h2 id="hero-name"></h2>
        <button id="save">Save</button>
        <button id="sample">Load Example</button>
      </section>
      <section class="card">
        <label>Title <input data-bind="meta.title" /></label>
        <label>Core angle <textarea data-bind="meta.angle"></textarea></label>
        <label>Hook <textarea data-bind="script.hook"></textarea></label>
        <label>Body <textarea data-bind="script.body"></textarea></label>
        <label>Reveal <textarea data-bind="script.reveal"></textarea></label>
        <label>Main visual <textarea data-bind="visuals.main"></textarea></label>
        <label>Overlay visual <textarea data-bind="visuals.overlay"></textarea></label>
        <label>Title <input data-bind="package.title" /></label>
        <label>Description <textarea data-bind="package.description"></textarea></label>
        <label>Hashtags <input data-bind="package.hashtags" /></label>
      </section>
    </main>
    <script type="module" src="/src/shortsStudio.js"></script>
  </body>
</html>
